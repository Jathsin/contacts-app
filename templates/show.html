{{ block "show" . }}
{{ template "layout-head" . }}
{{ template "contact" . }}
{{ template "layout-foot" . }}
{{ end }}

{{ block "contact" . }}
<h1>{{ .First }} {{ .Last }}</h1>

<div>
    <div>Phone: {{ .Phone }}</div>
    <div>Email: {{ .Email }}</div>
</div>

<p>
    <a href="/contacts" class="btn-outline">Back</a>
    <a href="/contacts/{{ .ID }}/edit" class="btn-outline">Edit</a>
</p>
{{ end }}
