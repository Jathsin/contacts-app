{{ block "index" . }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>First</th>
                <th>Last </th>
                <th>Phone</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {{ range . }}
            <tr>
                <td>{{ .ID }}</td>
                <td>{{ .Name }}</td>
                <td>{{ .Phone }}</td>
                <td>{{ .Email }}</td>
                <td><a href="/contacts/{{ .ID }}/edit">Edit</a>
                    <a href="/contacts/{{ .ID }}">View</a>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</body>

</html>
{{end}}
