{{ block "rows" . }}
<tbody>
    {{ range .Contacts }}
    <tr>
        <td><input type="checkbox" name="selected_contact_ids" value="{{ .ID }}" x-model="selected"></td>
        <td>{{ .First }}</td>
        <td>{{ .Last }}</td>
        <td>{{ .Phone }}</td>
        <td>{{ .Email }}</td>
        <td>
            <div data-overflow-menu>
                <button type="button" aria-hahspopup="menu" aria-controls="contact-menu-{{ .ID }}">
                    Options</button>
                <div role="menu" id="contact-menu-{{ .ID }}">
                    <a role="menuitem" href="/contacts/{{ .ID }}/edit">Edit</a>
                    <a role="menuitem" href="/contacts/{{ .ID }}">View</a>
                </div>
            </div>
            <!-- <a href="/contacts/{{ .ID }}/edit">Edit</a>
            <a href="/contacts/{{ .ID }}">View</a>
            <a href="#" hx-delete="/contacts/{{ .ID }}" hx-confirm="Are you sure you want to kill this contact?"
                hx-swap="outerHTML swap:1s" hx-target="closest tr">Delete</a> -->
        </td>
    </tr>
    {{ end }}
</tbody>
{{ end }}
